<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 32px;
            color: #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 960px;
            width: 100%;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .card-body {
            padding: 16px;
        }
        .card-body h2 {
            font-size: 1.25rem;
            color: #222;
            margin-bottom: 8px;
        }
        .card-body p {
            color: #666;
            font-size: 0.9rem;
        }
        .card-body .label {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>Food Gallery</h1>
    <div class="grid" id="gallery"></div>

    <script>
        let foodDatabase = [
            {
                id: 1,
                name: "Pizza",
                size: "small",
                cuisine: "Italian",
                origin: "Italy",
                vegetarian: false,
            },
            {
                id: 2,
                name: "PadThai",
                size: "small",
                cuisine: "Italian",
                origin: "Italy",
                vegetarian: false,
            },
            {
                id: 3,
                name: "Pasta",
                size: "small",
                cuisine: "Italian",
                origin: "Italy",
                vegetarian: false,
            },
        ];

        const gallery = document.getElementById("gallery");

        foodDatabase.forEach(item => {
            const slug = item.name.toLowerCase().replace(/\s+/g, "-");
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="https://source.unsplash.com/400x200/?${slug}" alt="${item.name}">
                <div class="card-body">
                    <h2>${item.name}</h2>
                    <p>Cuisine: ${item.cuisine}</p>
                    <p>Origin: ${item.origin}</p>
                    <span class="label">${item.vegetarian ? "Vegetarian" : "Non-Vegetarian"}</span>
                </div>
            `;
            gallery.appendChild(card);
        });
    </script>
</body>
</html>
